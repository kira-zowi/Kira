<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="favourites.html">Favourites</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="schedule.html">Schedule</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Registration</a></li>
            </ul>
        </nav>
    </header>
    <hr>

    <section>
        <form action="">
            <h3>Registration</h3>
            <div>
                <label for="name">Name: </label>
                <input type="text" id="name" name="username" placeholder="Enter your name" required>
            </div>
            <div>
                <label for="email">Email: </label>
                <input type="email" id="email" name="useremail" placeholder="example@gmail.com" required>
            </div>
            <div>
                <label for="age">Age: </label>
                <input type="number" id="age" name="userage" placeholder="Enter your age" min="18" max="100">
            </div>
            <div>
                <label for="country">Choose your Country:</label>
                <select name="yourcountry" id="country">
                    <option value="">-- Select a country --</option>
                    <option value="UK">UK</option>
                    <option value="USA">USA</option>
                    <option value="Japan">Japan</option>
                    <option value="Canada">Canada</option>
                    <option value="Italy">Italy</option>
                </select>
            </div>
            <div>
                <label for="job">Occupation: </label>
                <input type="text" id="job" name="userjob" placeholder="Enter your occupation">
            </div>
            <fieldset>
                <legend>Choose your Gender: </legend>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="others" name="gender" value="others" checked>
                <label for="others">Others</label>
            </fieldset>

            <fieldset>
                <legend>Choose your Interests: </legend>
                <div>
                    <input type="checkbox" id="coding" name="interests" value="coding">
                    <label for="coding">Coding</label>
                </div>
                <div>
                    <input type="checkbox" id="reading" name="interests" value="reading" checked>
                    <label for="reading">Reading</label>
                </div>

                <div>
                    <input type="checkbox" id="singing" name="interests" value="singing">
                    <label for="singing">Singing</label>
                </div>
                <div>
                    <input type="checkbox" id="dancing" name="interests" value="dancing">
                    <label for="dancing">Dancing</label>
                </div>
                <div>
                    <input type="checkbox" id="cooking" name="interests" value="cooking">
                    <label for="cooking">Cooking</label>
                </div>
            </fieldset>
            <div>
                <label for="biography">Tell us about yourself.</label>
                <textarea name="yourbiography" id="biography" placeholder="tell us about yourself." rows="4" cols="30"
                    minlength="10" maxlength="80" required></textarea>
            </div>
            <br>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
    </section>
    <hr>

    <footer>
        <p>Be the driver of your life not a passenger.</p>
    </footer>
</body>

</html>
