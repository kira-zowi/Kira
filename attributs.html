<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attributes</title>
</head>

<body>
    <h1 id="heading">Attributes</h1>
    <div class="content">
        <p>What are attributes?</p>
        <p>HTML attributes provide additional information about HTML elements and are always included in the opening
            tag. They usually come in name/value pairs like name="value".</p>
            <p title="HyperText Markup Language">
    HTML stands for HyperText Markup Language.
</p>
    </div>
    <p>Learn more about attributes on <a href="https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Attributes"
            target="_blank" rel="noopener noreferrer">here.</a></p>


    <div>
        <label for="attribute">What are attributes?</label>
        <textarea name="attribute" id="attribute"
            readonly>HTML attributes provide additional information about elements.</textarea>
    </div>

    <p hidden>Hello!</p>
     <br>
    <div class="info">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" required placeholder="Type your name">
        <button disabled>Submit</button>
    </div>
</body>

</html>
